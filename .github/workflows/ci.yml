name: Quality checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install locked toolchain
        run: npm ci
      - name: Run release checks
        shell: bash
        run: |
          if ! npm run check > /tmp/release-check.log 2>&1; then
            tail -n 80 /tmp/release-check.log
            exit 1
          fi
          tail -n 40 /tmp/release-check.log
