name: Quality checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install locked toolchain
        run: npm ci
      - name: Format
        run: npm run format:check
      - name: Syntax
        run: npm run lint
      - name: Content contracts
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Content unit tests
        run: node --test tests/unit/content.test.mjs
      - name: Entity unit tests
        run: node --test tests/unit/entity.test.mjs
      - name: Output unit tests
        run: node --test tests/unit/output.test.mjs
      - name: Links
        run: npm run test:links
      - name: Schema
        run: npm run test:schema
      - name: Claims
        run: npm run test:claims
      - name: Routes
        run: npm run test:routes
      - name: SEO authority
        run: npm run test:seo-authority
      - name: Visible editorial content
        run: npm run test:visible-content
      - name: Accessibility preflight
        run: npm run test:a11y
      - name: Performance budget
        run: npm run test:performance
      - name: Security
        run: npm run test:security
