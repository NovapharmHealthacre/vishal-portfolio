name: Quality checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install locked toolchain
        run: npm ci --silent
      - name: Build gallery candidate
        id: build
        continue-on-error: true
        run: npm run build --silent > gallery-build.log 2>&1
      - name: Upload gallery diagnostics
        if: steps.build.outcome != 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gallery-build-diagnostics
          path: gallery-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce gallery build
        if: steps.build.outcome != 'success'
        run: exit 1
      - name: Run release checks
        run: npm run check
