name: Quality checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install locked toolchain
        run: npm ci --silent
      - name: Format
        run: npm run format:check --silent
      - name: Syntax
        run: npm run lint --silent
      - name: Content contracts
        run: npm run typecheck --silent
      - name: Build
        shell: bash
        run: |
          set +e
          npm run build --silent > /tmp/gallery-build.log 2>&1
          status=$?
          cat /tmp/gallery-build.log
          exit $status
      - name: Unit tests
        run: npm test --silent
      - name: Links
        run: npm run test:links --silent
      - name: Schema
        run: npm run test:schema --silent
      - name: Claims
        run: npm run test:claims --silent
      - name: Routes
        run: npm run test:routes --silent
      - name: SEO authority
        run: npm run test:seo-authority --silent
      - name: Visible content
        run: npm run test:visible-content --silent
      - name: Gallery
        run: npm run test:gallery --silent
      - name: Accessibility preflight
        run: npm run test:a11y --silent
      - name: Performance budget
        run: npm run test:performance --silent
      - name: Security
        run: npm run test:security --silent
