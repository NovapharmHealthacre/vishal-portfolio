name: Deploy production site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  signal:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Mark publication pending
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${RELEASE_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"pages-live-publish\",\"description\":\"Building and publishing the approved personal AI release\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

  build:
    needs: signal
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install locked toolchain
        run: npm ci
      - name: Formatting hygiene
        run: npm run format:check
      - name: Syntax and lint
        run: npm run lint
      - name: Content contracts
        run: npm run typecheck
      - name: Build generated site
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Link validation
        run: npm run test:links
      - name: Structured data validation
        run: npm run test:schema
      - name: Claims governance
        run: npm run test:claims
      - name: Route validation
        run: npm run test:routes
      - name: SEO authority validation
        run: npm run test:seo-authority
      - name: Visible content validation
        run: npm run test:visible-content
      - name: Gallery validation
        run: npm run test:gallery
      - name: Accessibility preflight
        run: npm run test:a11y
      - name: Performance budget
        run: npm run test:performance
      - name: Security validation
        run: npm run test:security
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload generated site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      statuses: write
    env:
      SITE_ORIGIN: https://vishal.novapharmhealthcare.com
      RELEASE_SHA: ${{ github.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify approved release on custom domain
        id: live
        continue-on-error: true
        run: |
          set -euo pipefail
          cache_key="release-${RELEASE_SHA}-$(date +%s)"
          for attempt in $(seq 1 72); do
            home=$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "${SITE_ORIGIN}/?${cache_key}-${attempt}" || true)
            assistant=$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              "${SITE_ORIGIN}/assets/founder-ai.js?${cache_key}-${attempt}" || true)
            knowledge_status=$(curl --silent --output /dev/null --write-out '%{http_code}' --location \
              -H 'Cache-Control: no-cache' \
              "${SITE_ORIGIN}/assets/founder-knowledge.json?${cache_key}-${attempt}" || true)

            if grep -Fq 'Ask Vishal’s Work' <<<"$home" \
              && grep -Fq 'data-founder-ai-dialog' <<<"$home" \
              && grep -Fq 'AI-generated summary based on Vishal’s published work' <<<"$assistant" \
              && [[ "$knowledge_status" == "200" ]]; then
              printf '%s\n' "Personal AI release verified on attempt ${attempt}."
              exit 0
            fi
            sleep 10
          done
          printf '%s\n' 'The custom domain did not serve the approved personal AI release within 12 minutes.' >&2
          exit 1

      - name: Mark publication successful
        if: steps.live.outcome == 'success'
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${RELEASE_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"pages-live-publish\",\"description\":\"Personal AI release verified on the custom domain\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Mark publication failed
        if: steps.live.outcome != 'success'
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${RELEASE_SHA}" \
            --data "{\"state\":\"failure\",\"context\":\"pages-live-publish\",\"description\":\"Personal custom-domain verification failed\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          exit 1
