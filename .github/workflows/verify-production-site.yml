name: Verify production site

on:
  workflow_run:
    workflows: ["Deploy production site"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify deployed custom domain
        id: smoke
        continue-on-error: true
        env:
          SITE_ORIGIN: https://vishal.novapharmhealthcare.com
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -uo pipefail
          report=/tmp/production-verification.md
          cache_key="release-${RELEASE_SHA}-$(date +%s)"
          success=false

          for attempt in $(seq 1 72); do
            home=$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "${SITE_ORIGIN}/?${cache_key}-${attempt}" || true)
            if grep -Fq 'Building a UK-led pharmaceutical company around market access' <<<"$home" \
              && grep -Fq 'Pharmaceutical essays' <<<"$home" \
              && ! grep -Fq 'Status before spectacle' <<<"$home"; then
              success=true
              break
            fi
            sleep 10
          done

          if [[ "$success" != true ]]; then
            cat > "$report" <<EOF
          ## Production verification failed

          The Pages workflow completed, but the custom domain did not serve the new founder homepage within the 12-minute verification window.

          Release: \`${RELEASE_SHA}\`
          EOF
            exit 1
          fi

          thinking=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/thinking/?${cache_key}")
          cornerstone=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/essays/regulatory-approval-is-not-market-access/?${cache_key}")
          founder=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/essays/why-i-chose-to-build-in-pharmaceuticals/?${cache_key}")
          retired=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/essays/why-i-left-swiggy/?${cache_key}")
          profile=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/facts/?${cache_key}")
          gallery=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/gallery/?${cache_key}")
          sitemap=$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${SITE_ORIGIN}/sitemap.xml?${cache_key}")

          grep -Fq '10 essays' <<<"$thinking"
          grep -Fq 'Regulatory Approval Is Not Market Access' <<<"$cornerstone"
          grep -Fq 'Why I Chose to Build in Pharmaceuticals' <<<"$founder"
          grep -Fq 'noindex,follow' <<<"$retired"
          grep -Fq '/essays/why-i-chose-to-build-in-pharmaceuticals/' <<<"$retired"
          if grep -Fq 'The Story Was Too Simple' <<<"$retired"; then
            echo 'Retired essay title was exposed in production' >&2
            exit 1
          fi
          grep -Fq 'Founder Profile' <<<"$profile"
          if grep -Fq 'Machine-readable fact record' <<<"$profile"; then
            echo 'Machine-facing copy was exposed on the founder profile' >&2
            exit 1
          fi
          grep -Fq 'href="/gallery/"' <<<"$home"
          grep -Fq 'gallery-preview' <<<"$home"
          grep -Fq '"@type": "ImageGallery"' <<<"$gallery"
          grep -Fq 'primaryImageOfPage' <<<"$gallery"
          if grep -Fq 'copyrightHolder' <<<"$gallery"; then
            echo 'Unsupported image copyright-holder metadata was exposed' >&2
            exit 1
          fi
          if grep -Fq 'creditText' <<<"$gallery"; then
            echo 'Unsupported image credit metadata was exposed' >&2
            exit 1
          fi
          [[ $(grep -o '<figure class="gallery-item' <<<"$gallery" | wc -l | tr -d ' ') == 11 ]]
          [[ $(grep -o '"@type": "ImageObject"' <<<"$gallery" | wc -l | tr -d ' ') == 12 ]]
          grep -Fq '/essays/regulatory-approval-is-not-market-access/' <<<"$sitemap"
          if grep -Fq '/essays/why-i-left-swiggy/' <<<"$sitemap"; then
            echo 'Retired essay route appeared in the sitemap' >&2
            exit 1
          fi
          [[ $(grep -o '<image:image>' <<<"$sitemap" | wc -l | tr -d ' ') == 11 ]]

          gallery_images=(
            /images/portrait/vishal-chakravarty-1440.jpg
            /images/gallery/vishal-chakravarty-oxblood-studio-portrait.jpg
            /images/gallery/vishal-chakravarty-black-suit-crossed-arms.jpg
            /images/gallery/vishal-chakravarty-studio-close-up.jpg
            /images/gallery/vishal-chakravarty-founder-at-work.jpg
            /images/gallery/vishal-chakravarty-light-suit-portrait.jpg
            /images/gallery/vishal-chakravarty-monochrome-blazer-profile.jpg
            /images/gallery/vishal-chakravarty-reflective-candid.jpg
            /images/gallery/vishal-chakravarty-editorial-reclining-portrait.jpg
            /images/gallery/vishal-chakravarty-black-suit-full-length.jpg
            /images/gallery/vishal-chakravarty-evening-mirror-portrait.jpg
          )
          for image_path in "${gallery_images[@]}"; do
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              "${SITE_ORIGIN}${image_path}?${cache_key}" \
              --output /dev/null
            grep -Fq "$image_path" <<<"$sitemap"
          done

          cat > "$report" <<EOF
          ## Production site verified

          The founder-authority release is live on the custom domain.

          - Homepage: new pharmaceutical founder proposition served
          - Thinking: 10 public essays served
          - Cornerstone market-access essay: served and indexable
          - Founder-origin essay: served and indexable
          - Retired essay route: neutral \`noindex,follow\` compatibility page
          - Profile: human-facing copy served without machine-record promotion
          - Gallery: 11 visible portraits, 12 ImageObjects and accurate primary-image metadata
          - Image rights: no unsupported creator or copyright-owner fields
          - Portrait assets: high-resolution official portrait and all ten supplied image URLs served
          - Sitemap: new cornerstone route included and retired route excluded
          - Image sitemap: all 11 portrait URLs included

          Release: \`${RELEASE_SHA}\`
          Verified: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF

      - name: Record verification summary
        if: always()
        run: |
          if [[ -f /tmp/production-verification.md ]]; then
            cat /tmp/production-verification.md >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' '## Production verification did not produce a report' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce verification result
        if: steps.smoke.outcome != 'success'
        run: exit 1
